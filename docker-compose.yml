services:
  django:
    build: .
    container_name: django
    command: gunicorn setup.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./backend:/app/backend
      - ./backend/media:/app/backend/media
    env_file:
      - .env
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/staticfiles:/static
      - ./backend/media:/media
    depends_on:
      - django

volumes:
  pgdata:
